<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="referrer" content="no-referrer" />
  <title>for you · the people</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='14'%3E%E2%9C%89%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <script src="friends.js"></script>
</head>
<body class="gallery">
  <header class="gallery-header">
    <p class="gallery-eyebrow">the people who love you</p>
    <h1 class="gallery-title" id="galleryTitle">for —</h1>
    <p class="gallery-sub">tap any card to listen. they're long — pour something, take your time.</p>
  </header>

  <main class="cards" id="cards" aria-label="friend videos"></main>

  <template id="cardTemplate">
    <article class="card" data-state="closed">
      <button class="card-face" type="button">
        <svg class="card-seal" viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="60" r="46" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 4" opacity="0.45" />
          <circle cx="60" cy="60" r="32" fill="currentColor" opacity="0.18" />
        </svg>
        <div class="card-name"></div>
        <div class="card-relationship"></div>
        <div class="card-cta"><span>open ›</span></div>
      </button>
      <div class="card-player" hidden>
        <video controls preload="none" playsinline></video>
        <button class="card-close" type="button" aria-label="close">close</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
  <script>
    document.getElementById("galleryTitle").textContent = "for " + window.SITE.herName;
    document.title = "for " + window.SITE.herName + " · the people";
    renderGallery();
  </script>
</body>
</html>
